<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>评论采集中心</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --line: #dde3ea;
      --text: #1f2937;
      --sub: #5b6877;
      --primary: #0b5fff;
      --danger: #c53b2d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #eef3ff 0%, var(--bg) 30%, var(--bg) 100%);
      color: var(--text);
    }
    .wrap { max-width: 1240px; margin: 20px auto; padding: 0 16px; }
    .title { font-size: 24px; font-weight: 700; margin: 0 0 12px; }
    .app-locked { overflow: hidden; }

    .startup-modal {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, 0.45);
      padding: 16px;
    }
    .startup-modal.show { display: flex; }
    .startup-card {
      width: min(920px, 100%);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.2);
    }
    .startup-title { margin: 0 0 8px; font-size: 20px; }
    .startup-desc { margin: 0 0 12px; color: var(--sub); font-size: 13px; }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .tab-btn {
      height: 36px;
      padding: 0 14px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--text);
      cursor: pointer;
      font-size: 14px;
    }
    .tab-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .panel { display: none; }
    .panel.active { display: block; }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 8px 18px rgba(0, 26, 88, 0.05);
      margin-bottom: 12px;
    }
    .row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    input, select, textarea, button {
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      padding: 8px 10px;
      font-size: 14px;
    }
    input, select, button { height: 36px; }
    input.wide { flex: 1; min-width: 260px; }
    textarea { width: 100%; min-height: 160px; resize: vertical; }
    button { cursor: pointer; }
    button.primary { background: var(--primary); border-color: var(--primary); color: #fff; }
    button.danger { background: #fff4f2; border-color: #ffd4cf; color: var(--danger); }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { border-bottom: 1px solid #edf1f5; text-align: left; padding: 8px 6px; vertical-align: top; }
    th { color: var(--sub); font-weight: 600; }
    td.actions { white-space: nowrap; }
    .muted { color: var(--sub); font-size: 12px; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .scroll { max-height: 66vh; overflow: auto; }
    .pager { display: flex; gap: 8px; align-items: center; justify-content: flex-end; margin-top: 10px; }

    .type-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8px;
      border: 1px solid #e5eaf2;
      border-radius: 999px;
      margin-right: 6px;
      margin-bottom: 6px;
    }

    .db-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 2fr; gap: 8px; }
    .token-grid { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; align-items: center; }

    .region-picker { width: 100%; border: 1px solid var(--line); border-radius: 10px; background: #fff; overflow: hidden; }
    .region-toolbar { display: flex; gap: 8px; align-items: center; padding: 8px; border-bottom: 1px solid #edf1f5; }
    .region-toggle { height: 32px; border-radius: 8px; border: 1px solid var(--line); background: #f7f9fc; cursor: pointer; }
    .region-tags { display: flex; gap: 6px; flex-wrap: wrap; min-height: 24px; }
    .tag { display: inline-flex; align-items: center; height: 24px; padding: 0 8px; border-radius: 999px; background: #eef3ff; color: #284f99; font-size: 12px; }
    .region-panel { max-height: 210px; overflow: auto; padding: 8px; display: none; }
    .region-picker.open .region-panel { display: block; }
    .region-grid { display: grid; grid-template-columns: repeat(4, minmax(120px, 1fr)); gap: 6px 10px; }
    .region-item { display: flex; gap: 6px; align-items: center; font-size: 13px; color: #374151; }
    .link-btn { background: #fff; border: 1px solid var(--line); color: #526173; height: 32px; }

    @media (max-width: 1000px) {
      .db-grid { grid-template-columns: 1fr 1fr; }
      .token-grid { grid-template-columns: 1fr; }
      .region-grid { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="startup-modal show" id="startupModal">
    <div class="startup-card">
      <h2 class="startup-title">先连接数据库</h2>
      <p class="startup-desc">首次输入后会保存；下次会自动回填，你只需要点击“测试并连接”。</p>
      <div class="db-grid">
        <input id="startupDbHost" placeholder="MySQL Host/IP" />
        <input id="startupDbPort" placeholder="Port" />
        <input id="startupDbUser" placeholder="User" />
        <input id="startupDbPassword" type="password" placeholder="Password" />
        <input id="startupDbName" placeholder="Database Name" />
      </div>
      <div class="row" style="margin-top:12px;">
        <button class="primary" id="btnStartupTestDb">测试并连接</button>
        <span class="muted" id="startupDbStatus">等待输入数据库配置</span>
      </div>
    </div>
  </div>

  <div class="wrap">
    <h1 class="title">评论采集中心</h1>

    <div class="tabs" id="tabs">
      <button class="tab-btn" data-tab="urls">URL 页面</button>
      <button class="tab-btn" data-tab="comments">评论页面</button>
      <button class="tab-btn" data-tab="task-manager">任务管理页面</button>
      <button class="tab-btn" data-tab="import">导入页面</button>
      <button class="tab-btn" data-tab="settings">设置页面</button>
    </div>

    <section class="panel" data-panel="urls">
      <div class="card">
        <h3>URL 查询</h3>
        <div class="row">
          <select id="filterUrlType"></select>
          <select id="filterStatus">
            <option value="">全部状态</option>
            <option value="未处理">未处理</option>
            <option value="等待中">等待中</option>
            <option value="处理中">处理中</option>
            <option value="处理完成">处理完成</option>
            <option value="处理失败">处理失败</option>
          </select>
          <button id="btnFilterUrl">查询</button>
        </div>
        <div class="scroll">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>URL / 作品ID</th>
                <th>类型</th>
                <th>状态</th>
                <th>更新时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="urlRows"></tbody>
          </table>
        </div>
        <div class="pager">
          <span class="muted" id="urlPagerInfo"></span>
          <button id="btnPrevPage">上一页</button>
          <button id="btnNextPage">下一页</button>
        </div>
      </div>

      <div class="card">
        <h3>批量获取评论</h3>
        <div class="row">
          <select id="batchTypeSelect"></select>
          <button class="danger" id="btnCollectAll">批量获取当前类型评论</button>
        </div>
        <div class="muted">说明：该操作会将所选类型下的任务批量加入后台队列。</div>
      </div>
    </section>

    <section class="panel" data-panel="task-manager">
      <div class="card">
        <h3>任务管理（按类型）</h3>
        <div class="scroll">
          <table>
            <thead>
              <tr>
                <th>类型</th>
                <th>总数量</th>
                <th>已处理数量</th>
                <th>已获取评论数</th>
                <th>任务状态</th>
              </tr>
            </thead>
            <tbody id="taskManagerRows"></tbody>
          </table>
        </div>
      </div>
    </section>

    <section class="panel" data-panel="comments">
      <div class="card">
        <div class="row">
          <input id="filterDetailId" placeholder="作品ID（精确匹配）" />
          <select id="filterCommentType"></select>
          <select id="filterCommentTime">
            <option value="">评论时间(全部)</option>
            <option value="1">1天内</option>
            <option value="3">3天内</option>
            <option value="7">7天内</option>
          </select>
          <input id="filterCommentKeyword" class="wide" placeholder="评论内容模糊查询" />
        </div>
        <div class="row">
          <div class="region-picker" id="regionPicker">
            <div class="region-toolbar">
              <button type="button" class="region-toggle" id="btnToggleRegions">选择地区（0）</button>
              <button type="button" class="link-btn" id="btnClearRegions">清空</button>
              <div class="region-tags" id="selectedRegionTags"></div>
            </div>
            <div class="region-panel">
              <div class="region-grid" id="regionOptions"></div>
            </div>
          </div>
        </div>
        <div class="row">
          <button id="btnFilterComment">查询</button>
          <button class="primary" id="btnExportComment">导出查询结果 Excel</button>
        </div>

        <div class="scroll">
          <table>
            <thead>
              <tr>
                <th>UID</th>
                <th>用户昵称</th>
                <th>地区</th>
                <th>评论时间</th>
                <th>评论内容</th>
              </tr>
            </thead>
            <tbody id="commentRows"></tbody>
          </table>
        </div>
        <div class="pager">
          <span class="muted" id="commentPagerInfo"></span>
          <button id="btnPrevCommentPage">上一页</button>
          <button id="btnNextCommentPage">下一页</button>
        </div>
      </div>
    </section>

    <section class="panel" data-panel="import">
      <div class="card">
        <h3>批量添加 URL（一行一个）</h3>
        <div class="row">
          <select id="urlTypeSelect"></select>
        </div>
        <textarea id="newUrls" placeholder="每行一个 URL"></textarea>
        <div class="row" style="margin-top:10px;">
          <button class="primary" id="btnAddUrl">批量新增 URL</button>
        </div>
      </div>
    </section>

    <section class="panel" data-panel="settings">
      <div class="card">
        <h3>数据库连接配置</h3>
        <div class="db-grid">
          <input id="dbHost" placeholder="MySQL Host/IP" />
          <input id="dbPort" placeholder="Port" />
          <input id="dbUser" placeholder="User" />
          <input id="dbPassword" type="password" placeholder="Password" />
          <input id="dbName" placeholder="Database Name" />
        </div>
        <div class="row" style="margin-top:10px;">
          <button id="btnSaveDb">保存配置</button>
          <button class="primary" id="btnTestDb">测试并连接</button>
          <span class="muted" id="dbStatus">未连接数据库</span>
        </div>
      </div>

      <div class="card">
        <h3>抖音 Token 切换</h3>
        <div class="token-grid">
          <select id="tokenMethod">
            <option value="clipboard">从剪贴板读取 Cookie (抖音)</option>
            <option value="browser">从浏览器读取 Cookie (抖音)</option>
          </select>
          <select id="tokenBrowser"></select>
          <button class="primary" id="btnSwitchToken">执行切换</button>
        </div>
        <div class="row" style="margin-top:10px;">
          <span class="muted" id="tokenStatus">Token 状态：未读取</span>
        </div>
      </div>

      <div class="card">
        <h3>类型管理</h3>
        <div class="row">
          <input id="newTypeName" placeholder="新增类型：如 光伏" />
          <button class="primary" id="btnAddType">新增类型</button>
        </div>
        <div id="typesBox"></div>
      </div>
    </section>
  </div>

  <script>
    const q = (id) => document.getElementById(id);
    const TAB_KEYS = ["urls", "comments", "task-manager", "import", "settings"];
    const REGIONS = [
      "北京", "天津", "河北", "山西", "内蒙古", "辽宁", "吉林", "黑龙江", "上海", "江苏", "浙江", "安徽", "福建", "江西", "山东", "河南", "湖北", "湖南", "广东", "广西", "海南", "重庆", "四川", "贵州", "云南", "西藏", "陕西", "甘肃", "青海", "宁夏", "新疆", "中国香港", "中国澳门", "中国台湾"
    ];

    let types = [];
    let dbReady = false;
    let browserList = [];
    let currentUrlPage = 1;
    let currentCommentPage = 1;
    const pageSize = 20;
    let startupConnecting = false;
    let collectAllSubmitting = false;
    let taskManagerTimer = null;

    async function request(url, options = {}) {
      const resp = await fetch(url, { headers: { "Content-Type": "application/json" }, ...options });
      const data = await resp.json().catch(() => ({}));
      if (!resp.ok) throw new Error(data.detail || "请求失败");
      return data;
    }

    function esc(s) {
      return (s ?? "").toString().replace(/[&<>\"]/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
    }

    function alertNeedDb() {
      alert("请先到设置页面点击“测试并连接”数据库");
    }

    function getTabFromQuery() {
      const tab = new URLSearchParams(window.location.search).get("tab") || "urls";
      return TAB_KEYS.includes(tab) ? tab : "urls";
    }

    function switchTab(tabKey, pushState = true) {
      const active = TAB_KEYS.includes(tabKey) ? tabKey : "urls";
      document.querySelectorAll(".tab-btn").forEach(el => {
        el.classList.toggle("active", el.dataset.tab === active);
      });
      document.querySelectorAll(".panel").forEach(el => {
        el.classList.toggle("active", el.dataset.panel === active);
      });
      if (pushState) {
        const u = new URL(window.location.href);
        u.searchParams.set("tab", active);
        history.replaceState({}, "", u.toString());
      }
    }

    function readDbConfigFromForm() {
      return {
        mysql_host: q("dbHost").value.trim(),
        mysql_port: Number(q("dbPort").value || 3306),
        mysql_user: q("dbUser").value.trim(),
        mysql_password: q("dbPassword").value,
        mysql_database: q("dbName").value.trim(),
      };
    }

    function readDbConfigFromStartupForm() {
      return {
        mysql_host: q("startupDbHost").value.trim(),
        mysql_port: Number(q("startupDbPort").value || 3306),
        mysql_user: q("startupDbUser").value.trim(),
        mysql_password: q("startupDbPassword").value,
        mysql_database: q("startupDbName").value.trim(),
      };
    }

    function fillDbConfigForm(cfg) {
      q("dbHost").value = cfg.mysql_host || "";
      q("dbPort").value = cfg.mysql_port || 3306;
      q("dbUser").value = cfg.mysql_user || "root";
      q("dbPassword").value = cfg.mysql_password || "";
      q("dbName").value = cfg.mysql_database || "douk_downloader";
    }

    function fillStartupDbConfigForm(cfg) {
      q("startupDbHost").value = cfg.mysql_host || "";
      q("startupDbPort").value = cfg.mysql_port || 3306;
      q("startupDbUser").value = cfg.mysql_user || "root";
      q("startupDbPassword").value = cfg.mysql_password || "";
      q("startupDbName").value = cfg.mysql_database || "douk_downloader";
    }

    function showStartupModal() {
      q("startupModal").classList.add("show");
      document.body.classList.add("app-locked");
      setTimeout(() => {
        const el = q("startupDbHost");
        if (el && !el.value.trim()) el.focus();
      }, 0);
    }

    function hideStartupModal() {
      q("startupModal").classList.remove("show");
      document.body.classList.remove("app-locked");
    }

    function toggleBrowserSelect() {
      q("tokenBrowser").disabled = q("tokenMethod").value !== "browser";
    }

    function renderBrowserOptions(defaultBrowser = "") {
      const target = q("tokenBrowser");
      const items = browserList.length ? browserList : ["Chrome"];
      target.innerHTML = items.map(b => `<option value="${esc(b)}">${esc(b)}</option>`).join("");
      const pick = defaultBrowser && items.includes(defaultBrowser) ? defaultBrowser : items[0];
      target.value = pick;
      toggleBrowserSelect();
    }

    function renderTypeOptions() {
      const all = ['<option value="">全部类型</option>', ...types.map(t => `<option value="${esc(t)}">${esc(t)}</option>`)].join("");
      const required = ['<option value="">请选择类型</option>', ...types.map(t => `<option value="${esc(t)}">${esc(t)}</option>`)].join("");
      q("filterUrlType").innerHTML = all;
      q("filterCommentType").innerHTML = all;
      q("urlTypeSelect").innerHTML = required;
      q("batchTypeSelect").innerHTML = required;
      q("typesBox").innerHTML = types.map(t => `<span class="type-item">${esc(t)} <button onclick="removeType('${encodeURIComponent(t)}')">删除</button></span>`).join("");
    }

    function selectedRegions() {
      return Array.from(document.querySelectorAll('input[name="region_filter"]:checked')).map(o => o.value);
    }

    function renderSelectedRegionTags() {
      const values = selectedRegions();
      q("btnToggleRegions").textContent = `选择地区（${values.length}）`;
      q("selectedRegionTags").innerHTML = values.slice(0, 8).map(r => `<span class="tag">${esc(r)}</span>`).join("");
      if (values.length > 8) {
        q("selectedRegionTags").insertAdjacentHTML("beforeend", `<span class="tag">+${values.length - 8}</span>`);
      }
    }

    function loadRegionOptions() {
      q("regionOptions").innerHTML = REGIONS.map(r => `
        <label class="region-item">
          <input type="checkbox" name="region_filter" value="${esc(r)}" />
          <span>${esc(r)}</span>
        </label>
      `).join("");
      document.querySelectorAll('input[name="region_filter"]').forEach(el => {
        el.addEventListener("change", renderSelectedRegionTags);
      });
      renderSelectedRegionTags();
    }

    function commentQueryParams(page = currentCommentPage) {
      const fetchType = q("filterCommentType").value.trim();
      const detailId = q("filterDetailId").value.trim();
      const timeRange = q("filterCommentTime").value;
      const keyword = q("filterCommentKeyword").value.trim();
      const regions = selectedRegions().join(",");
      return new URLSearchParams({
        detail_id: detailId,
        fetch_type: fetchType,
        time_range: timeRange,
        keyword,
        regions,
        page: String(page),
        page_size: String(pageSize),
      });
    }

    async function loadDbConfig() {
      const cfg = await request("/comment-center/api/db-config");
      fillDbConfigForm(cfg);
      fillStartupDbConfigForm(cfg);
    }

    async function loadTokenStatus() {
      const data = await request("/comment-center/api/douyin-token/status");
      browserList = data.browsers || [];
      renderBrowserOptions(data.browser_default || "Chrome");
      q("tokenStatus").textContent = `Token 状态：${data.cookie_status || "未设置"}（切换后会保存到 settings.json，下次启动可继续使用）`;
    }

    async function switchDouyinToken() {
      const method = q("tokenMethod").value;
      const browser = q("tokenBrowser").value;
      const res = await request("/comment-center/api/douyin-token/switch", {
        method: "POST",
        body: JSON.stringify({ method, browser }),
      });
      q("tokenStatus").textContent = `Token 状态：${res.cookie_status || "已更新"}（已持久化）`;
      alert(res.message || "切换完成");
    }

    async function saveDbConfig() {
      const cfg = readDbConfigFromForm();
      if (!cfg.mysql_host) return alert("请填写数据库地址");
      await request("/comment-center/api/db-config", {
        method: "POST",
        body: JSON.stringify(cfg),
      });
      q("dbStatus").textContent = "配置已保存，未连接";
      dbReady = false;
      alert("数据库配置已保存");
    }

    async function loadTypes() {
      if (!dbReady) return;
      const data = await request("/comment-center/api/types");
      types = data.data || [];
      renderTypeOptions();
    }

    async function testDbConfigAndConnect(cfg = readDbConfigFromForm(), source = "settings") {
      if (!cfg.mysql_host) {
        if (source === "startup") {
          q("startupDbStatus").textContent = "请填写数据库地址";
        }
        return alert("请填写数据库地址");
      }
      const res = await request("/comment-center/api/db-config/test", {
        method: "POST",
        body: JSON.stringify(cfg),
      });
      q("dbStatus").textContent = res.message || "";
      q("startupDbStatus").textContent = res.message || "";
      if (!res.ok) {
        dbReady = false;
        showStartupModal();
        return alert(res.message || "连接失败");
      }
      dbReady = true;
      fillDbConfigForm(cfg);
      fillStartupDbConfigForm(cfg);
      await loadTypes();
      await Promise.all([loadUrls(1), loadComments(1), loadTaskManager()]);
      hideStartupModal();
      if (source === "startup") {
        alert("数据库连接成功，已进入主页面");
      } else {
        alert("数据库连接成功，数据已加载");
      }
    }

    async function testDbConfigFromStartup() {
      if (startupConnecting) return;
      startupConnecting = true;
      q("btnStartupTestDb").disabled = true;
      const cfg = readDbConfigFromStartupForm();
      try {
        return await testDbConfigAndConnect(cfg, "startup");
      } finally {
        startupConnecting = false;
        q("btnStartupTestDb").disabled = false;
      }
    }

    async function addType() {
      if (!dbReady) return alertNeedDb();
      const name = q("newTypeName").value.trim();
      if (!name) return alert("请输入类型名称");
      await request("/comment-center/api/types", { method: "POST", body: JSON.stringify({ name }) });
      q("newTypeName").value = "";
      await loadTypes();
    }

    async function removeType(encodedName) {
      if (!dbReady) return alertNeedDb();
      const name = decodeURIComponent(encodedName);
      if (!confirm(`确认删除类型：${name}？`)) return;
      await request(`/comment-center/api/types?name=${encodeURIComponent(name)}`, { method: "DELETE" });
      await loadTypes();
      await Promise.all([loadUrls(1), loadComments(1), loadTaskManager()]);
    }

    async function addUrls() {
      if (!dbReady) return alertNeedDb();
      const fetch_type = q("urlTypeSelect").value.trim();
      const urls_text = q("newUrls").value.trim();
      if (!fetch_type) return alert("请选择类型");
      if (!urls_text) return alert("请输入 URL（每行一个）");
      const res = await request("/comment-center/api/url-list", {
        method: "POST",
        body: JSON.stringify({ fetch_type, urls_text }),
      });
      q("newUrls").value = "";
      await Promise.all([loadUrls(1), loadTaskManager()]);
      alert(`新增完成，新增 ${res.inserted} 条，重复 ${res.duplicated} 条，忽略无效链接 ${res.ignored || 0} 条`);
    }

    async function loadUrls(page = currentUrlPage) {
      if (!dbReady) return;
      const fetchType = q("filterUrlType").value.trim();
      const status = q("filterStatus").value.trim();
      const params = new URLSearchParams({
        fetch_type: fetchType,
        status,
        page: String(page),
        page_size: String(pageSize),
      });
      const data = await request(`/comment-center/api/url-list?${params.toString()}`);
      currentUrlPage = data.page || page;
      q("urlRows").innerHTML = (data.items || []).map(row => `
        <tr>
          <td class="mono">${row.id}</td>
          <td>
            <div class="mono">${esc(row.url)}</div>
            <div class="muted">detail_id: ${esc(row.detail_id || "")}</div>
            ${row.last_error ? `<div style="color:#c53b2d">${esc(row.last_error)}</div>` : ""}
          </td>
          <td>${esc(row.fetch_type)}</td>
          <td>${esc(row.status)}</td>
          <td class="muted">${esc(row.updated_at || "")}</td>
          <td class="actions"><button onclick="collectOne(${row.id})">获取评论</button></td>
        </tr>
      `).join("");
      const total = data.total || 0;
      const totalPages = Math.max(1, Math.ceil(total / pageSize));
      q("urlPagerInfo").textContent = `第 ${currentUrlPage} / ${totalPages} 页，共 ${total} 条`;
      q("btnPrevPage").disabled = currentUrlPage <= 1;
      q("btnNextPage").disabled = currentUrlPage >= totalPages;
    }

    async function collectOne(taskId) {
      if (!dbReady) return alertNeedDb();
      const res = await request("/comment-center/api/collect-one", {
        method: "POST",
        body: JSON.stringify({ task_id: taskId }),
      });
      await Promise.all([loadUrls(currentUrlPage), loadTaskManager()]);
      alert(res.message || "任务后台处理中");
    }

    async function collectAll() {
      if (!dbReady) return alertNeedDb();
      if (collectAllSubmitting) return;
      const fetch_type = q("batchTypeSelect").value.trim();
      if (!fetch_type) return alert("请选择批量采集类型");
      collectAllSubmitting = true;
      q("btnCollectAll").disabled = true;
      try {
        const res = await request("/comment-center/api/collect-all", {
          method: "POST",
          body: JSON.stringify({ fetch_type }),
        });
        if (res.ok) {
          await Promise.all([loadUrls(currentUrlPage), loadTaskManager()]);
          alert(`${res.message || "任务后台处理中"}；入队 ${res.queued ?? 0} 条，跳过 ${res.skipped ?? 0} 条`);
          return;
        }
        if (res.conflict && res.active_batch) {
          const runningType = res.active_batch.fetch_type || "未知类型";
          const yes = confirm(`已有任务进行中（类型：${runningType}），是否结束当前批量任务？`);
          if (!yes) return;
          const stopRes = await request("/comment-center/api/collect-all/stop", {
            method: "POST",
            body: JSON.stringify({ batch_id: res.active_batch.batch_id }),
          });
          await Promise.all([loadUrls(1), loadTaskManager()]);
          alert(stopRes.message || "当前批量任务已终止");
          return;
        }
        alert(res.message || "操作失败");
      } finally {
        collectAllSubmitting = false;
        q("btnCollectAll").disabled = false;
      }
    }

    async function loadTaskManager() {
      if (!dbReady) return;
      const data = await request("/comment-center/api/task-manager");
      const items = data.items || [];
      q("taskManagerRows").innerHTML = items.map(row => `
        <tr>
          <td>${esc(row.fetch_type || "")}</td>
          <td class="mono">${Number(row.total_count || 0)}</td>
          <td class="mono">${Number(row.processed_count || 0)}</td>
          <td class="mono">${Number(row.comment_count || 0)}</td>
          <td>${esc(row.status || "")}</td>
        </tr>
      `).join("");
      if (!items.length) {
        q("taskManagerRows").innerHTML = `<tr><td colspan="5" class="muted">暂无任务数据</td></tr>`;
      }
    }

    async function loadComments(page = currentCommentPage) {
      if (!dbReady) return;
      const params = commentQueryParams(page);
      const data = await request(`/comment-center/api/comments?${params.toString()}`);
      currentCommentPage = data.page || page;
      q("commentRows").innerHTML = (data.items || []).map(row => `
        <tr>
          <td class="mono">${esc(row.uid || "")}</td>
          <td>${esc(row.nickname || "")}</td>
          <td>${esc(row.ip_label || "")}</td>
          <td class="muted">${esc(row.comment_time_display || "")}</td>
          <td>${esc(row.text || "")}</td>
        </tr>
      `).join("");
      const total = data.total || 0;
      const totalPages = Math.max(1, Math.ceil(total / pageSize));
      q("commentPagerInfo").textContent = `第 ${currentCommentPage} / ${totalPages} 页，共 ${total} 条`;
      q("btnPrevCommentPage").disabled = currentCommentPage <= 1;
      q("btnNextCommentPage").disabled = currentCommentPage >= totalPages;
    }

    function exportComments() {
      if (!dbReady) return alertNeedDb();
      const params = commentQueryParams(1);
      params.delete("page");
      params.delete("page_size");
      window.location.href = `/comment-center/api/comments/export?${params.toString()}`;
    }

    q("btnSaveDb").addEventListener("click", saveDbConfig);
    q("btnTestDb").addEventListener("click", () => testDbConfigAndConnect(readDbConfigFromForm(), "settings"));
    q("btnStartupTestDb").addEventListener("click", testDbConfigFromStartup);
    ["startupDbHost", "startupDbPort", "startupDbUser", "startupDbPassword", "startupDbName"].forEach((id) => {
      q(id).addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          testDbConfigFromStartup();
        }
      });
    });
    q("tokenMethod").addEventListener("change", toggleBrowserSelect);
    q("btnSwitchToken").addEventListener("click", switchDouyinToken);
    q("btnAddType").addEventListener("click", addType);

    q("btnAddUrl").addEventListener("click", addUrls);

    q("btnFilterUrl").addEventListener("click", () => loadUrls(1));
    q("btnCollectAll").addEventListener("click", collectAll);
    q("btnPrevPage").addEventListener("click", () => loadUrls(currentUrlPage - 1));
    q("btnNextPage").addEventListener("click", () => loadUrls(currentUrlPage + 1));

    q("btnFilterComment").addEventListener("click", () => loadComments(1));
    q("btnExportComment").addEventListener("click", exportComments);
    q("btnPrevCommentPage").addEventListener("click", () => loadComments(currentCommentPage - 1));
    q("btnNextCommentPage").addEventListener("click", () => loadComments(currentCommentPage + 1));

    q("btnToggleRegions").addEventListener("click", () => {
      q("regionPicker").classList.toggle("open");
    });
    q("btnClearRegions").addEventListener("click", () => {
      document.querySelectorAll('input[name="region_filter"]').forEach(el => { el.checked = false; });
      renderSelectedRegionTags();
    });

    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => switchTab(btn.dataset.tab));
    });

    (async () => {
      try {
        loadRegionOptions();
        switchTab(getTabFromQuery(), false);
        renderTypeOptions();
        showStartupModal();
        await loadDbConfig();
        await loadTokenStatus();
        if (taskManagerTimer) clearInterval(taskManagerTimer);
        taskManagerTimer = setInterval(() => {
          if (!dbReady) return;
          loadTaskManager().catch(() => {});
        }, 3000);
      } catch (e) {
        alert(e.message);
      }
    })();

    window.removeType = removeType;
    window.collectOne = collectOne;
  </script>
</body>
</html>
